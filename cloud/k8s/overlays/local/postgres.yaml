apiVersion: v1
kind: Secret
metadata:
  name: houston-postgres-env
  namespace: houston-system
  labels:
    app: postgres
type: Opaque
stringData:
  POSTGRES_USER: houston
  POSTGRES_PASSWORD: change-me-local-dev
  POSTGRES_DB: houston_cloud
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: houston-postgres-data
  namespace: houston-system
  labels:
    app: postgres
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: houston-system
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: houston-postgres-env
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - houston
                - -d
                - houston_cloud
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: houston-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: houston-system
  labels:
    app: postgres
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
