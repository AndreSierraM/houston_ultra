apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: houston-system

resources:
  - ../../base
  - postgres.yaml
  - ingress.yaml

patches:
  - target:
      kind: Deployment
      name: houston-control-plane
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: houston-control-plane
      spec:
        template:
          spec:
            initContainers:
              - name: wait-for-postgres
                image: busybox:1.36
                imagePullPolicy: IfNotPresent
                command:
                  - sh
                  - -c
                  - until nc -z postgres.houston-system.svc.cluster.local 5432; do sleep 2; done
